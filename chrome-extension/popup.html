<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/opendyslexic.css');

        :root {
            --primary: #14b8a6;
            --primary-hover: #0d9488;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent-blue: #3b82f6;
        }

        body {
            width: 380px;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 20px;
        }

        .header {
            padding: 16px 20px;
            background: rgba(30, 41, 59, 0.5);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            padding: 20px;
        }

        .section-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 24px;
            transition: border-color 0.2s;
        }

        .input-card:focus-within {
            border-color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .slider-group {
            grid-column: span 2;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .3s;
            border-radius: 22px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--primary);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(18px);
        }

        .btn-action {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, var(--primary) 0%, #0d9488 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(20, 184, 166, 0.25);
            transition: all 0.2s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(20, 184, 166, 0.35);
        }

        .btn-action:active {
            transform: translateY(0);
        }

        .btn-action:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        #result-wrapper {
            margin-top: 30px;
            display: none;
            animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .result-card {
            background: #ffffff;
            color: #1e293b;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            min-height: 100px;
        }

        .result-content {
            font-size: 16px;
            line-height: 1.7;
        }

        .result-toolbar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f0fdfa;
        }

        .font-lexy {
            font-family: 'OpenDyslexic', sans-serif !important;
        }

        .loader {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tooltip style */
        .tooltip {
            position: relative;
        }
        .tooltip:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 10px;
            background: #1e293b;
            color: #fff;
            font-size: 10px;
            border-radius: 6px;
            white-space: nowrap;
            z-index: 1000;
        }

        #error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            </div>
            <h1>Lexify 2.0</h1>
        </div>
        <div style="font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 0.1em;">PRO</div>
    </div>

    <div class="container">
        <div class="input-card">
            <textarea id="inputText" placeholder="Enter text or let Lexify auto-scan the page..."></textarea>
        </div>

        <div class="settings-grid">
            <div class="option-group">
                <span class="section-label">Read Mode</span>
                <select id="modeSelect">
                    <option value="simplified">Simplify Text</option>
                    <option value="bullets">Quick Bullets</option>
                    <option value="plain">Plain Grammar</option>
                </select>
            </div>
            <div class="option-group">
                <span class="section-label">Dyslexia Font</span>
                <div class="control-panel">
                    <span style="font-size: 12px; font-weight: 600;">Active</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="fontToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <span>Reading Font Size</span>
                    <span id="sizeVal">18px</span>
                </div>
                <input type="range" id="sizeSlider" min="14" max="26" step="1" value="18">
            </div>
        </div>

        <button id="simplifyBtn" class="btn-action">
            <div id="loader" class="loader"></div>
            <span id="btnText">Lexify it</span>
        </button>

        <div id="error-msg"></div>

        <div id="result-wrapper">
            <span class="section-label" style="display: flex; justify-content: space-between;">
                <span>Result</span>
                <span style="color: var(--primary); font-weight: 800; cursor: pointer;" id="clearBtn">CLEAR</span>
            </span>
            <div class="result-card">
                <div id="result-content" class="result-content"></div>
                <div class="result-toolbar">
                    <button id="ttsBtn" class="tool-btn tooltip" data-tip="Listen">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                    <button id="copyBtn" class="tool-btn tooltip" data-tip="Copy">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
