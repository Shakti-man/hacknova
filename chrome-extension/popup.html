<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 16px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #f1f5f9;
            resize: none;
            font-size: 14px;
            margin-bottom: 12px;
        }

        textarea:focus {
            outline: none;
            border-color: #14b8a6;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #14b8a6, #06b6d4);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #result {
            margin-top: 16px;
            padding: 12px;
            background: #1e293b;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }

        .loading {
            text-align: center;
            margin-top: 16px;
            color: #14b8a6;
            font-weight: bold;
            display: none;
        }
    </style>
</head>

<body>
    <div style="display: flex; align-items: center; margin-bottom: 12px;">
        <h2 style="margin: 0; font-size: 18px; color: #fff;">Lexify Reader</h2>
    </div>

    <textarea id="inputText" placeholder="Select text on the page or paste here to simplify..."></textarea>
    <button id="simplifyBtn">Simplify Text</button>

    <div id="loading" class="loading">Simplifying...</div>
    <div id="result"></div>

    <script src="popup.js"></script>
</body>

</html>
